<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบจองที่นั่งห้องเรียนพิเศษ</title>
    <link rel="stylesheet" href="styles.css"> 
</head>
<body>

    <header>
        <h1>📚 ระบบจองที่นั่งห้องเรียนพิเศษ ✏️</h1>
    </header>

    <main class="study-room-layout">
        
        <div class="chalkboard">
            <h2>กระดาน</h2>
            <p>คลิกที่ **ที่นั่ง** เพื่อจองตำแหน่งเรียน</p>
        </div>

        <div id="desk-container">
            
            <div class="desk-column" id="column-left">
                
                <div class="desk" data-desk-id="1">
                    <div class="seat-group">
                        <div class="seat" data-seat-id="1.1" data-status="available"></div>
                        <div class="seat" data-seat-id="1.2" data-status="available"></div>
                        <div class="seat" data-seat-id="1.3" data-status="available"></div>
                    </div>
                    <div class="desk-label">โต๊ะ 1</div>
                </div>
                
                <div class="desk" data-desk-id="2">
                    <div class="seat-group">
                        <div class="seat" data-seat-id="2.1" data-status="available"></div>
                        <div class="seat" data-seat-id="2.2" data-status="available"></div>
                        <div class="seat" data-seat-id="2.3" data-status="available"></div>
                    </div>
                    <div class="desk-label">โต๊ะ 2</div>
                </div>
                
                <div class="desk" data-desk-id="3">
                    <div class="seat-group">
                        <div class="seat" data-seat-id="3.1" data-status="booked" title="จองโดย: จันทรา ม.4/1"></div>
                        <div class="seat" data-seat-id="3.2" data-status="available"></div>
                        <div class="seat" data-seat-id="3.3" data-status="available"></div>
                    </div>
                    <div class="desk-label">โต๊ะ 3</div>
                </div>
                
                <div class="desk" data-desk-id="4">
                    <div class="seat-group">
                        <div class="seat" data-seat-id="4.1" data-status="available"></div>
                        <div class="seat" data-seat-id="4.2" data-status="available"></div>
                        <div class="seat" data-seat-id="4.3" data-status="available"></div>
                    </div>
                    <div class="desk-label">โต๊ะ 4</div>
                </div>
                
                <div class="desk" data-desk-id="5">
                    <div class="seat-group">
                        <div class="seat" data-seat-id="5.1" data-status="available"></div>
                        <div class="seat" data-seat-id="5.2" data-status="available"></div>
                        <div class="seat" data-seat-id="5.3" data-status="available"></div>
                    </div>
                    <div class="desk-label">โต๊ะ 5</div>
                </div>
                
            </div>

            <div class="aisle-center">ทางเดินกลางห้อง</div>

            <div class="desk-column" id="column-right">
                
                <div class="desk" data-desk-id="6">
                    <div class="seat-group">
                        <div class="seat" data-seat-id="6.1" data-status="available"></div>
                        <div class="seat" data-seat-id="6.2" data-status="available"></div>
                        <div class="seat" data-seat-id="6.3" data-status="available"></div>
                    </div>
                    <div class="desk-label">โต๊ะ 6</div>
                </div>
                
                <div class="desk" data-desk-id="7">
                    <div class="seat-group">
                        <div class="seat" data-seat-id="7.1" data-status="booked" title="จองโดย: มานะ ม.4/1"></div>
                        <div class="seat" data-seat-id="7.2" data-status="available"></div>
                        <div class="seat" data-seat-id="7.3" data-status="available"></div>
                    </div>
                    <div class="desk-label">โต๊ะ 7</div>
                </div>
                
                <div class="desk" data-desk-id="8">
                    <div class="seat-group">
                        <div class="seat" data-seat-id="8.1" data-status="available"></div>
                        <div class="seat" data-seat-id="8.2" data-status="available"></div>
                        <div class="seat" data-seat-id="8.3" data-status="available"></div>
                    </div>
                    <div class="desk-label">โต๊ะ 8</div>
                </div>
                
                <div class="desk" data-desk-id="9">
                    <div class="seat-group">
                        <div class="seat" data-seat-id="9.1" data-status="available"></div>
                        <div class="seat" data-seat-id="9.2" data-status="available"></div>
                        <div class="seat" data-seat-id="9.3" data-status="available"></div>
                    </div>
                    <div class="desk-label">โต๊ะ 9</div>
                </div>
                
                <div class="desk" data-desk-id="10">
                    <div class="seat-group">
                        <div class="seat" data-seat-id="10.1" data-status="available"></div>
                        <div class="seat" data-seat-id="10.2" data-status="available"></div>
                        <div class="seat" data-seat-id="10.3" data-status="available"></div>
                    </div>
                    <div class="desk-label">โต๊ะ 10</div>
                </div>
                
            </div>

        </div>
    </main>

    <div id="booking-modal" class="modal">
        <div class="modal-content">
            <span class="close-button">&times;</span>
            <h2>ฟอร์มจองที่นั่งเรียน</h2>
            <p>คุณกำลังจะจอง **<span id="current-desk-info"></span>**</p>
            <form id="booking-form">
                <label for="name">ชื่อจริง:</label>
                <input type="text" id="name" name="entry.2119879183" required> 

                <label for="nickname">ชื่อเล่น:</label>
                <input type="text" id="nickname" name="entry.1744498140" required>

                <label for="class-room">ชั้นและห้อง:</label>
                <input type="text" id="class-room" name="entry.1296537747" placeholder="ตัวอย่าง: ม.5/2" required>

                <button type="submit" class="book-button">ยืนยันการจอง</button>
            </form>
        </div>
    </div>

    <iframe name="hidden_iframe" id="hidden_iframe" style="display:none;" 
            onload="if(submitted) { submitted=false; handleSuccessfulSubmission(); }">
    </iframe>

    <script src="script.js"></script>
</body>
</html>
